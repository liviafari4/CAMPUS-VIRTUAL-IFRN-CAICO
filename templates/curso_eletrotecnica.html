{% extends 'base.html' %}

{% block title %}Eletrotécnica{% endblock %}

{% block content %}

<a href="/cursos" class="btn-voltar">← Voltar para cursos</a>

<style>

.pagina-curso{
max-width:1100px;
margin:30px auto;
padding:20px;
}

.hero{
background:
linear-gradient(rgba(47,158,65,.85),rgba(47,158,65,.85)),
url("{{ url_for('static', filename='img/eletro.jpg') }}");

background-size:cover;
background-position:center;

padding:90px 30px;
border-radius:20px;
color:white;
text-align:center;
}

.bloco{
background:white;
padding:30px;
margin-top:30px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,.1);
}

iframe{
width:100%;
height:450px;
border:none;
border-radius:12px;
}

.galeria{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.galeria img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
}

</style>

<main class="pagina-curso">

<section class="hero">

<h1>Eletrotécnica</h1>

<p>
Eletricidade, automação e inovação.
</p>

</section>

<section class="bloco">

<h2>Sobre</h2>

<p>
Curso voltado para eletricidade, automação e sistemas industriais.
</p>

</section>

<section class="bloco">

<h2>Vídeo</h2>

<iframe
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
allowfullscreen>
</iframe>

</section>

<section class="bloco">

<div class="galeria">

<img src="{{ url_for('static', filename='img/eletro.jpg') }}">
<img src="{{ url_for('static', filename='img/campus.jpg') }}">
<img src="{{ url_for('static', filename='img/eletro.jpg') }}">

</div>

</section>

</main>

{% endblock %}
